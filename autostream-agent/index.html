<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoStream Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            /* Change these hex codes to match your company's branding */
            --brand-primary: #4F46E5;
            --brand-hover: #4338CA;
            --bg-color: #f4f4f9;
            --bot-msg-bg: #f1f1f1;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 80vh;
            max-height: 700px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: var(--brand-primary);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .clear-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            transition: background 0.2s;
        }
        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            line-height: 1.4;
        }
        .message p { margin: 0 0 8px 0; }
        .message p:last-child { margin: 0; }
        .message ul, .message ol { margin: 0 0 8px 0; padding-left: 20px; }
        .message ul:last-child, .message ol:last-child { margin: 0; }
        .user-message {
            background: var(--brand-primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            background: var(--bot-msg-bg);
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .chat-input {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        .chat-input input:focus {
            border-color: var(--brand-primary);
        }
        .chat-input input:disabled {
            background: #f9f9f9;
            cursor: not-allowed;
        }
        .chat-input button {
            background: var(--brand-primary);
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .chat-input button:hover {
            background: var(--brand-hover);
        }
        .chat-input button:disabled {
            background: #a5a5a5;
            cursor: not-allowed;
        }
        .typing-dots {
            display: flex;
            align-items: center;
            height: 20px;
            gap: 4px;
        }
        .typing-dots span {
            width: 8px;
            height: 8px;
            background-color: #888;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <span>AutoStream Sales Agent</span>
            <button class="clear-btn" onclick="clearChat()">Clear</button>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">Hi there! 👋 I'm the AutoStream assistant. How can I help you with your video editing needs today?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Generate a unique session ID for this browser tab
        let sessionId = "sess-" + Math.random().toString(36).substring(2, 15);

        // Handle SPA routing for 404s
        window.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            if (currentPath !== "/" && currentPath !== "/index.html") {
                document.getElementById("chat-messages").innerHTML = "";
                const errorText = `Oops! 🚧 It looks like you've navigated to a page that doesn't exist (\`${currentPath}\`).\n\nClick here to return home`;
                addMessage(errorText, "bot-message");
                
                document.getElementById("user-input").disabled = true;
                document.querySelector(".chat-input button").disabled = true;
            }
        });

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const message = inputField.value.trim();
            if (!message) return;

            // 1. Add user message to UI
            addMessage(message, "user-message");
            inputField.value = "";

            // 2. Add loading/typing indicator
            const loadingId = addMessage('<div class="typing-dots"><span></span><span></span><span></span></div>', "bot-message");

            try {
                // Dynamically select backend URL. Use relative path if hosted together on Render.
                // If frontend is on Vercel, replace the URL below with your actual Render backend URL.
                const isVercel = window.location.hostname.includes("vercel.app");
                const backendUrl = isVercel ? "https://<YOUR-RENDER-APP-NAME>.onrender.com" : ""; 

                console.log(`[Debug] Sending request to: ${backendUrl}/api/chat`);
                const response = await fetch(`${backendUrl}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message,
                        session_id: sessionId
                    })
                });
                
                const data = await response.json();
                console.log("[Debug] API Response:", data);
                
                // Calculate a natural typing delay (e.g., 15ms per character, capped between 500ms and 2500ms)
                const typingDelay = data.response ? Math.min(Math.max(data.response.length * 15, 500), 2500) : 500;
                await new Promise(resolve => setTimeout(resolve, typingDelay));

                // 4. Remove loading indicator and show the bot's actual response
                document.getElementById(loadingId).remove();
                
                if (data.response) {
                    addMessage(data.response, "bot-message");
                } else if (data.error) {
                    console.error("[Error] API returned an error:", data.error);
                    addMessage("Error: " + data.error, "bot-message");
                }
                
            } catch (error) {
                document.getElementById(loadingId).remove();
                console.error("[Error] Fetch Request Failed:", error);
                addMessage("Error connecting to the server. Make sure your Python backend is running.", "bot-message");
            }
        }

        async function clearChat() {
            // Clear backend session
            try {
                const isVercel = window.location.hostname.includes("vercel.app");
                const backendUrl = isVercel ? "https://<YOUR-RENDER-APP-NAME>.onrender.com" : ""; 
                
                await fetch(`${backendUrl}/api/clear`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });
            } catch (e) {
                console.error("[Error] Failed to clear backend session:", e);
            }

            // Reset session ID to ensure a completely fresh state
            sessionId = "sess-" + Math.random().toString(36).substring(2, 15);

            // Reset UI
            document.getElementById("chat-messages").innerHTML = '<div class="message bot-message">Hi there! 👋 I\'m the AutoStream assistant. How can I help you with your video editing needs today?</div>';
            
            // Re-enable inputs in case they were disabled by the 404 state
            document.getElementById("user-input").disabled = false;
            document.querySelector(".chat-input button").disabled = false;
        }

        function addMessage(text, className) {
            const messagesDiv = document.getElementById("chat-messages");
            const messageDiv = document.createElement("div");
            messageDiv.className = "message " + className;
            
            // Render Markdown for bot messages, plain text for user messages
            if (className.includes("bot-message")) {
                messageDiv.innerHTML = marked.parse(text);
            } else {
                messageDiv.innerText = text;
            }
            
            const id = "msg-" + Date.now();
            messageDiv.id = id;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight; // Auto-scroll to bottom
            return id;
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>
</body>
</html>
