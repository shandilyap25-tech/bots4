<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoStream Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 80vh;
            max-height: 700px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #4F46E5;
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            line-height: 1.4;
        }
        .message p { margin: 0 0 8px 0; }
        .message p:last-child { margin: 0; }
        .message ul, .message ol { margin: 0 0 8px 0; padding-left: 20px; }
        .message ul:last-child, .message ol:last-child { margin: 0; }
        .user-message {
            background: #4F46E5;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            background: #f1f1f1;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .chat-input {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        .chat-input input:focus {
            border-color: #4F46E5;
        }
        .chat-input button {
            background: #4F46E5;
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .chat-input button:hover {
            background: #4338CA;
        }
        .typing-indicator {
            font-style: italic;
            color: #888;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">AutoStream Sales Agent</div>
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">Hi there! 👋 I'm the AutoStream assistant. How can I help you with your video editing needs today?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Generate a unique session ID for this browser tab
        const sessionId = "sess-" + Math.random().toString(36).substring(2, 15);

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const message = inputField.value.trim();
            if (!message) return;

            // 1. Add user message to UI
            addMessage(message, "user-message");
            inputField.value = "";

            // 2. Add loading/typing indicator
            const loadingId = addMessage("Typing...", "bot-message typing-indicator");

            try {
                // 3. Send data to your Python backend (/api/chat)
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message,
                        session_id: sessionId
                    })
                });
                
                const data = await response.json();
                
                // 4. Remove loading indicator and show the bot's actual response
                document.getElementById(loadingId).remove();
                
                if (data.response) {
                    addMessage(data.response, "bot-message");
                } else if (data.error) {
                    addMessage("Error: " + data.error, "bot-message");
                }
                
            } catch (error) {
                document.getElementById(loadingId).remove();
                addMessage("Error connecting to the server. Make sure your Python backend is running.", "bot-message");
            }
        }

        function addMessage(text, className) {
            const messagesDiv = document.getElementById("chat-messages");
            const messageDiv = document.createElement("div");
            messageDiv.className = "message " + className;
            
            // Render Markdown for bot messages, plain text for user messages
            if (className.includes("bot-message")) {
                messageDiv.innerHTML = marked.parse(text);
            } else {
                messageDiv.innerText = text;
            }
            
            const id = "msg-" + Date.now();
            messageDiv.id = id;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight; // Auto-scroll to bottom
            return id;
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>
</body>
</html>
